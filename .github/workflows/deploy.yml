name: Deploy to lightsail instance

on:
  push:
    branches: [ master, deploy ]

permissions:
  contents: read
  deployments: write
  statuses: write

jobs:
  build:
    runs-on: self-hosted
    outputs:
      deployment_id: ${{ steps.deployment.outputs.deployment_id }}
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'aws-lightsail-solicare-instance',
              transient_environment: false,
              auto_inactive: true,
              required_contexts: []
            });
            core.setOutput('deployment_id', deployment.data.id)
      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/yarn
            node_modules
          key: yarn-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-
      - name: Add npm global bin to PATH
        shell: bash
        run: |
          echo "PATH=$(npm bin -g):$PATH" >> $GITHUB_ENV
          export PATH=$(npm bin -g):$PATH
          which yarn
          yarn --version
      - name: Install dependencies (yarn)
        shell: bash
        run: yarn install --frozen-lockfile
      - name: Build (yarn)
        shell: bash
        run: yarn build
      - name: Upload production-ready build
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build

      # Deployment status update (success)
      - name: Deployment Status Success
        if: success() && steps.deployment.outputs.deployment_id != ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.deployment_id }},
              state: 'success',
              environment_url: 'https://solicare.kro.kr',
              log_url: 'https://github.com/Solicare/solicare-app-frontend/actions/runs/${{ github.run_id }}#step:~:text=Build+(yarn)'
            })

      # Deployment status update (failure)
      - name: Deployment Status Failure
        if: failure() && steps.deployment.outputs.deployment_id != ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.deployment_id }},
              state: 'failure',
              log_url: 'https://github.com/Solicare/solicare-app-frontend/actions/runs/${{ github.run_id }}'
            })

  test:
    runs-on: self-hosted
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Run tests
        run: yarn test --watchAll=false

  deploy:
    runs-on: self-hosted
    needs: [test, build]
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build
      - name: Install pm2 and serve
        run: yarn global add pm2 serve
      - name: Stop previous app (ignore error if not running)
        run: |
          pm2 delete solicare-frontend || true
      - name: Start app with pm2
        run: |
          pm2 start npx --name solicare-frontend -- serve -s build -l 3000
      - name: Show pm2 status
        run: pm2 status
      - name: Deployment Status Success
        if: success() && needs.build.outputs.deployment_id != ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ needs.build.outputs.deployment_id }},
              state: 'success',
              environment_url: 'https://solicare.kro.kr',
              log_url: 'https://github.com/Solicare/solicare-app-frontend/actions/runs/${{ github.run_id }}'
            })
      - name: Deployment Status Failure
        if: failure() && needs.build.outputs.deployment_id != ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ needs.build.outputs.deployment_id }},
              state: 'failure',
              log_url: 'https://github.com/Solicare/solicare-app-frontend/actions/runs/${{ github.run_id }}'
            })
